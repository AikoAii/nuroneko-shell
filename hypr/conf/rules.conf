##############################
### WINDOW RULES ###
##############################

# ==========================
# PICTURE IN PICTURE
# ==========================
windowrule {
    name = picture_in_picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$

    float = true
    keep_aspect_ratio = true
    move = (monitor_w*0.75) (monitor_h*0.75)
    size = (monitor_w*0.25) (monitor_h*0.25)
    pin = true
}

# ==========================
# OPACITY (GLOBAL + OVERRIDE)
# ==========================
# default semua window
windowrule = opacity 0.9 override 0.9 override, match:class ^(.*)$

# browser utama full opacity
windowrule = opacity 1 override 1 override, match:class ^(zen-browser)$

# file manager agak transparan
windowrule = opacity 0.88 override 0.88 override, match:class ^(nemo)$


# ==========================
# IDLE INHIBIT (VIDEO & BROWSER)
# ==========================
windowrule = idle_inhibit fullscreen, match:class ^(.*mpv.*)$|^(.*vlc.*)$|^(.*celluloid.*)$
windowrule = idle_inhibit fullscreen, match:class ^(.*zen.*)$|^(.*firefox.*)$|^(.*chromium.*)$|^(.*brave.*)$


# ==========================
# FLOAT WINDOWS (UTILITY)
# ==========================
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(qalculate-qt)$
windowrule = float on, match:class ^(file-roller)$
windowrule = float on, match:class ^(qt5ct)$
windowrule = float on, match:class ^(qt6ct)$
windowrule = float on, match:class ^(org.kde.polkit-kde-authentication-agent-1)$


# ==========================
# CENTERED FLOAT WINDOWS
# ==========================
windowrule = float on, center on, size (monitor_w*0.5) (monitor_h*0.6), match:class ^(qalculate-qt)$
windowrule = float on, center on, size (monitor_w*0.6) (monitor_h*0.7), match:class ^(file-roller)$


# ==========================
# MEDIA / CONTROL APPS
# ==========================
windowrule = float on, size (monitor_w*0.48) (monitor_h*0.42), match:class ^(org.pulseaudio.pavucontrol)$


# ==========================
# DIALOG WINDOWS
# ==========================
windowrule = float on, match:title ^(Open)$
windowrule = float on, match:title ^(Save As)$
windowrule = float on, match:title ^(Authentication Required)$
windowrule = float on, match:title ^(Confirm to replace files)$
windowrule = float on, match:title ^(File Operation Progress)$
windowrule = float on, match:title ^(Choose Files)$
windowrule = float on, match:title ^(Open File)$
windowrule = float on, match:title ^(.*dialog.*)$
windowrule = float on, match:class ^(.*dialog.*)$


# ==========================
# BROWSER SPECIAL (PIP FIREFOX)
# ==========================
windowrule = float on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$


# ==========================
# PORTAL WINDOWS (FIX FILE PICKER)
# ==========================
windowrule = float on, center on, match:class ^(org.freedesktop.impl.portal.desktop.hyprland)$
windowrule = float on, center on, match:class ^(org.freedesktop.impl.portal.desktop.gtk)$
windowrule = float on, center on, match:class ^([Xx]dg-desktop-portal-gtk)$


###################
### LAYER RULES ###
###################

# Waybar
layerrule = blur on, ignore_alpha 0, match:namespace waybar

# Launcher (fuzzel)
layerrule = blur on, ignore_alpha 0, match:namespace fuzzel

# Notifications (mako / swaync)
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications

layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0, match:namespace swaync-notification-window

layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-control-center

# ==========================
# TERMINAL POPUPS (BTOP & FASTFETCH)
# ==========================

# btop
windowrule = float on, center on, size (monitor_w*0.6) (monitor_h*0.7), match:class ^(btop-popup)$
windowrule = rounding 12, match:class ^(btop-popup)$
windowrule = opacity 0.95 override 0.95 override, match:class ^(btop-popup)$

# fastfetch clean popup (FIX)
windowrule = float on, center on, match:class ^(fastfetch-popup)$
windowrule = no_blur on, match:class ^(fastfetch-popup)$
windowrule = opacity 1 override 1 override, match:class ^(fastfetch-popup)$

