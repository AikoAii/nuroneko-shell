###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# ==========================
# CORE
# ==========================
bind = $mainMod, Q, killactive
#bind = $mainMod, SPACE, togglefloating
bind = $mainMod, SPACE, exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 65% 65% && hyprctl dispatch moveactive exact 15% 15%
bind = ALT, RETURN, fullscreen
bind = $mainMod, P, pseudo
bind = $mainMod, J, layoutmsg, togglesplit


# ==========================
# LAUNCH APPS
# ==========================
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, Z, exec, $browser
bind = $mainMod, E, exec, $explorer


# ==========================
# UTILITIES
# ==========================
bind = $mainMod, C, exec, code
bind = $mainMod, N, exec, $notes


# ==========================
# WALLPAPER CONTROL
# ==========================

# picker (fuzzel, no terminal)
bind = $mainMod, W, exec, ~/.local/bin/wallpicker
# random wallpaper
bind = $mainMod SHIFT, W, exec, ~/.local/bin/setwp --random
# restore last wallpaper
bind = $mainMod CTRL, W, exec, ~/.local/bin/setwp --current


# ==========================
# CLIPBOARD 
# ==========================
bind = $mainMod, V, exec, $clipboard
bind = $mainMod SHIFT, V, exec, cliphist wipe


# ==========================
# SCREENSHOT
# ==========================
bind = , Print, exec, $screenshot
bind = SHIFT, Print, exec, $record


# ==========================
# SAFE SYSTEM
# ==========================
bind = $mainMod, L, exec, $lock

bind = $mainMod CTRL, DELETE, exec, $powermenu
bind = $mainMod CTRL SHIFT, Q, exec, $logout
bind = $mainMod CTRL SHIFT, S, exec, $shutdown
bind = $mainMod CTRL SHIFT, R, exec, $reboot

# Reload config (aman)
bind = CTRL SHIFT, R, exec, hyprctl reload


# ==========================
# TOGGLE / SMART
# ==========================
bind = $mainMod, TAB, exec, $fileManager

# Waybar toggle
bind = $mainMod, B, exec, killall waybar || waybar


# ==========================
# SCRATCHPAD 
# ==========================
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, T, exec, [workspace special:magic] $terminal
bind = $mainMod, M, exec, [workspace special:magic] $music


# ==========================
# FOCUS
# ==========================
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d


# ==========================
# WORKSPACES
# ==========================
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# ==========================
# MOUSE
# ==========================
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

###################
### MEDIA KEYS ###
###################

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+; wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}' > /tmp/wobpipe
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%-; wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}' > /tmp/wobpipe
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle; wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}' > /tmp/wobpipe
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous

bind = $mainMod, SLASH, exec, cat ~/.config/hypr/keybinds_ui.txt | fuzzel --dmenu --prompt "󰌌 Keybinds: "
