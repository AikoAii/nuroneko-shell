#######################################################################################
# AUTOGENERATED HYPRLAND CONFIG
# Edit sesuai kebutuhan: https://wiki.hypr.land/Configuring/
#######################################################################################

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_THEME,Shiroko
env = XCURSOR_SIZE,32
env = HYPRCURSOR_THEME,Shiroko
env = HYPRCURSOR_SIZE,32

env = PATH,$HOME/bin:$PATH:

# Override size
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


################
### MONITORS ###
################

monitor = ,preferred,auto,1


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = yazi
$menu = fuzzel


#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = mako
exec-once = nm-applet
exec-once = blueman-applet
exec-once = awww init
exec-once = awww-daemon
exec-once = hypridle
exec-once = clipvault
exec-once = wob

exec-once = pipewire
exec-once = pipewire-pulse
exec-once = wireplumber


#################
### EXEC INIT ###
#################

exec = hyprctl setcursor Bibata-Modern-Classic 20
exec = gsettings set org.gnome.desktop.interface cursor-theme 'Bibata-Modern-Classic'
exec = gsettings set org.gnome.desktop.interface cursor-size 20


###################
### LOOK & FEEL ###
###################

general {
    gaps_in = 3
    gaps_out = 8
    border_size = 3

    col.active_border = rgb(b4befe) rgb(f5c2e7) 45deg
    col.inactive_border = rgba(00000000)

    resize_on_border = true
    layout = dwindle
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

decoration {
    dim_special = 0.3
    rounding = 10

    blur {
        enabled = yes
        special = true
        size = 6
        passes = 3
        new_optimizations = on
        ignore_opacity = on
        xray = false
    }
}


###################
### ANIMATIONS ###
###################

animations {
    enabled = yes

    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1

    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, loop
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, wind
}


###################
### LAYOUT ###
###################

dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    new_status = master
}

general {
    layout = dwindle
}


###################
### MISC ###
###################

misc {
    vrr = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    anr_missed_pings = 5
    allow_session_lock_restore = true
}

xwayland {
    force_zero_scaling = true
}


###################
### INPUT ###
###################

input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
    numlock_by_default = true

    follow_mouse = 1
    sensitivity = 0
    force_no_accel = 1
    accel_profile = flat

    touchpad {
        natural_scroll = no
    }
}

gestures {
    gesture = 3, horizontal, workspace
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod, C, killactive
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, nemo
bind = $mainMod, V, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, J, layoutmsg, togglesplit

bind = $mainMod, B, exec, killall waybar || waybar

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, Q, killactive
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, W, exec, sh ~/bin/select-wallpaper.sh
bind = CTRL SHIFT, R, exec, hyprctl reload
bind = Ctrl+Shift, tab, exec, BTOP

bind = , Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/screenshot.png
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | swappy -f -

bind = $mainMod, SPACE, togglefloating
bind = ALT, RETURN, fullscreen
bind = SUPER, Z, exec, zen-browser


# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d


# Workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# Special workspace
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic


# Mouse
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


###################
### MEDIA KEYS ###
###################

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+; wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}' > /tmp/wobpipe
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%-; wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}' > /tmp/wobpipe
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle; wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}' > /tmp/wobpipe
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOW RULES ###
##############################

# Picture in Picture
windowrule {
    name = picture_in_picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    float = true
    keep_aspect_ratio = true
    move = (monitor_w*0.75) (monitor_h*0.75)
    size = (monitor_w*0.25) (monitor_h*0.25)
    pin = true
}

# Opacity
windowrule = opacity 0.90 0.90, match:class ^(.*)$
windowrule = opacity 1 1, match:class ^(firefox)$
windowrule = opacity 0.88 0.88, match:class ^(nemo)$

# Idle inhibit
windowrule = idle_inhibit fullscreen, match:class ^(.*mpv.*)$|^(.*vlc.*)$|^(.*celluloid.*)$
windowrule = idle_inhibit fullscreen, match:class ^(.*firefox.*)$|^(.*chromium.*)$|^(.*zen.*)$

# Floating
windowrule = float on, match:class ^(vlc)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float on, match:class ^(qt5ct)$
windowrule = float on, match:class ^(qt6ct)$
windowrule = float on, match:class ^(org.kde.ark)$
windowrule = float on, match:class ^(yad)$

# Centered floating
windowrule = float on, center on, size (monitor_w*0.5) (monitor_h*0.6), match:class ^(gnome-calculator)$
windowrule = float on, center on, size (monitor_w*0.6) (monitor_h*0.7), match:class ^(org.gnome.FileRoller)$

# Dialogs
windowrule = float on, match:title ^(Open)$
windowrule = float on, match:title ^(Save As)$
windowrule = float on, match:title ^(Authentication Required)$
windowrule = float on, match:title ^(File Operation Progress)$
windowrule = float on, match:class ^(.*dialog.*)$

# Portal
windowrule = float on, center on, match:class ^(org.freedesktop.impl.portal.desktop.hyprland)$
windowrule = float on, center on, match:class ^(org.freedesktop.impl.portal.desktop.gtk)$


###################
### LAYER RULES ###
###################

layerrule = blur on, ignore_alpha 0, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi

layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications

layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-control-center

layerrule = blur on, ignore_alpha 0, match:namespace waybar
