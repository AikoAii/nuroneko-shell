###################
### PROGRAMS ###
###################

# ==========================
# CORE
# ==========================
$terminal = kitty
$fileManager = kitty -e yazi
$menu = fuzzel


# ==========================
# BROWSER
# ==========================
$browser = zen-browser


# ==========================
# EDITOR / DEV
# ==========================
$editor = code
$editor_cli = nvim


# ==========================
# SYSTEM
# ==========================
$lock = hyprlock
$logout = hyprctl dispatch exit
$shutdown = loginctl poweroff
$reboot = loginctl reboot


# ==========================
# FILE / SYSTEM TOOLS
# ==========================
$explorer = nemo
$archive = file-roller
$terminal_fm = ranger


# ==========================
# MEDIA
# ==========================
$music = spotify
$video = mpv
$image = imv


# ==========================
# NETWORK / BLUETOOTH
# ==========================
$wifi = nm-connection-editor
$bluetooth = blueman-manager


# ==========================
# UTILITY
# ==========================
$calculator = qalculate-qt
$notes = obsidian
$monitor = btop
$process = btop


# ==========================
# SCREENSHOT / RECORDING
# ==========================
$screenshot = flameshot gui -d 200
$record = wf-recorder


# ==========================
# CLIPBOARD
# ==========================
$clipboard = cliphist list | fuzzel --dmenu | cliphist decode | wl-copy


# ==========================
# POWER MENU (OPTIONAL)
# ==========================
$powermenu = wlogout


# ==========================
# WALLPAPER
# ==========================
$wallpaper = sh ~/bin/select-wallpaper.sh


# ==========================
# OPTIONAL (ALT / BACKUP)
# ==========================


# Launcher
# $menu = rofi -show drun

# Browser
# $browser = firefox
