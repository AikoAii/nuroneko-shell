# =========================================================
# GENERAL
# =========================================================

general {
    # Lock command
    lock_cmd = pidof hyprlock || hyprlock

    # Lock before suspend
    before_sleep_cmd = loginctl lock-session

    # Wake display after resume
    after_sleep_cmd = wlopm --on '*'

    # Respect media/fullscreen inhibit
    ignore_dbus_inhibit = false
}

# =========================================================
# DIM SCREEN
# =========================================================

listener {
    timeout = 120

    on-timeout = brightnessctl -s set 15
    on-resume = brightnessctl -r
}

# =========================================================
# LOCKSCREEN
# =========================================================

listener {
    timeout = 300

    on-timeout = loginctl lock-session
}

# =========================================================
# DISPLAY POWER SAVE
# =========================================================

listener {
    timeout = 600

    on-timeout = wlopm --off '*'
    on-resume = wlopm --on '*'
}

# =========================================================
# AUTO SUSPEND
# =========================================================

listener {
    timeout = 1200

    on-timeout = loginctl suspend
}

