# ======================
# CATPPUCCIN LOCKSCREEN
# ======================

background {
    monitor =
    path = .local/share/wallpapers/current
    blur_passes = 1
}

# TIME
label {
    text = cmd[update:1000] echo "$(date +"%I:%M")"
    color = rgba(cdd6f4ff)
    font_size = 100
    font_family = JetBrainsMono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

# DATE
label {
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(a6adc8ff)
    font_size = 25
    font_family = JetBrainsMono Nerd Font
    position = 0, 300
    halign = center
    valign = center
}

# AVATAR
image {
    path = ~/.face.icon
    size = 120
    rounding = -1
    border_size = 3
    border_color = rgba(89b4faff)
    position = 0, 0
    halign = center
    valign = center
}

# INPUT
input-field {
    size = 300, 50
    outline_thickness = 2
    outer_color = rgba(89b4faff)
    inner_color = rgba(1e1e2eff)
    font_color = rgba(cdd6f4ff)

    placeholder_text = Enter Password
    position = 0, -100
    halign = center
    valign = center
}
